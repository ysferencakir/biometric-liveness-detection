{% extends "base.html" %}

{% block title %}Başarılı Giriş{% endblock %}

{% block content %}
<div class="success-container">
    <div class="success-icon">✅</div>
    
    <h1 style="color: #28a745; margin-bottom: 10px;">Hoşgeldiniz!</h1>
    
    <div class="user-greeting">
        👤 {{ user }}
    </div>
    
    <p style="color: #666; font-size: 1.1em; margin-bottom: 30px;">
        Yüz tamasıyla başarıyla giriş yaptınız.
    </p>
    
    <div class="alert alert-success">
        Sisteme giriş başarılı!
    </div>
    
    <a href="{{ url_for('index') }}" class="button" style="display: inline-block; width: auto; padding: 12px 40px; margin-top: 30px;">
        🏠 Ana Menüye Dön
    </a>
    
    <a href="{{ url_for('logout') }}" class="button button-secondary" style="display: inline-block; width: auto; padding: 12px 40px; margin-top: 15px;">
        👋 Çıkış Yap
    </a>
</div>

<style>
    .success-container {
        animation: fadeIn 0.5s ease-in;
    }
    
    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(-20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
</style>
{% endblock %}
